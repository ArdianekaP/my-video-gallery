<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Archive</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #121212; color: white; text-align: center; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 40px 20px 150px 20px; }
        .video-card { background: #1e1e1e; padding: 15px; border-radius: 12px; width: 320px; position: relative; }
        .video-title { margin-bottom: 10px; font-size: 16px; color: #007bff; font-weight: bold; text-align: left; }
        video { border-radius: 8px; width: 100%; background: #000; }
        .ads-overlay { position: absolute; top: 45px; left: 15px; width: calc(100% - 30px); height: 180px; z-index: 100; cursor: pointer; background: rgba(0,0,0,0); }
        .loading-text { display: none; font-size: 12px; color: #aaa; margin: 5px 0; }
        .btn-delete { position: relative; z-index: 101; color: #ff5555; background: none; border: 1px solid #ff5555; padding: 5px 10px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .upload-section { position: fixed; bottom: 20px; right: 20px; background: rgba(30, 30, 30, 0.95); padding: 15px; border-radius: 12px; border: 1px solid #333; width: 220px; text-align: left; z-index: 1000; backdrop-filter: blur(5px); }
        .upload-section input, .upload-section button { width: 100%; margin-bottom: 8px; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        
        /* Gaya tambahan saat tombol loading */
        .btn-uploading { background: #444 !important; cursor: not-allowed !important; }
    </style>
</head>
<body>
    <div style="padding-top: 30px;"><h2>📁 Video Archive</h2></div>
    <div class="gallery" id="videoContainer"></div>

    <div class="upload-section">
        <h3 id="statusText">Admin Upload (Max 500MB)</h3>
        <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">
            <input type="text" name="title" placeholder="Judul Video" required>
            <input type="file" name="video" accept="video/mp4" required>
            <input type="password" name="password" placeholder="Pass Key" required>
            <button type="submit" id="btnSubmit" style="background:#007bff; color:white; border:none; cursor:pointer;">Deploy Video</button>
        </form>
    </div>

    <script>
        // Fitur Visual Loading saat Upload File Besar
        const uploadForm = document.getElementById('uploadForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const statusText = document.getElementById('statusText');

        uploadForm.onsubmit = function() {
            btnSubmit.disabled = true;
            btnSubmit.classList.add('btn-uploading');
            btnSubmit.innerText = "Uploading... Please Wait";
            statusText.innerText = "⏳ Sedang Mengirim File...";
            statusText.style.color = "#007bff";
        };

        function prosesIklan(event, videoId) {
            const smartLink = "https://www.profitablecpmratenetwork.com/t2v3hgxv?key=173e8b7ec9146a87ccf987038e57f6f9";
            const videoElement = document.getElementById(videoId);
            const overlay = event.target;
            const loadingMsg = overlay.nextElementSibling;

            window.open(smartLink, '_blank');
            overlay.style.display = 'none';
            if(loadingMsg) loadingMsg.style.display = 'block';

            setTimeout(() => {
                if(loadingMsg) loadingMsg.style.display = 'none';
                videoElement.play(); 
            }, 3000);
        }

        async function loadVideos() {
            const res = await fetch('/api/videos');
            const videos = await res.json();
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';
            videos.forEach((file, index) => {
                const videoId = "vid-" + index;
                const displayName = file.split(' - ').slice(0, -1).join(' - ') || "Untitled";
                container.innerHTML += `
                    <div class="video-card">
                        <div class="ads-overlay" onclick="prosesIklan(event, '${videoId}')"></div>
                        <div class="loading-text">Menyiapkan video... (3 detik)</div>
                        <div class="video-title">${displayName}</div>
                        <video id="${videoId}" controls><source src="/uploads/${file}" type="video/mp4"></video>
                        <button class="btn-delete" onclick="hapusVideo('${file}')">Remove</button>
                    </div>`;
            });
        }

        async function hapusVideo(filename) {
            const pass = prompt("Admin Passphrase:");
            if (!pass) return;
            const response = await fetch('/delete-video', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ filename, password: pass })
            });
            if ((await response.json()).success) loadVideos();
        }

        loadVideos();
    </script>
    <script src="https://pl29180025.profitablecpmratenetwork.com/eb/39/25/eb39256009464b36f9b3fb16873b622c.js"></script>
</body>
</html>
